services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-healingtouch}
      DB_USERNAME: ${DB_USERNAME:-healingtouch}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    depends_on:
      redis:
        condition: service_started
    ports:
      - "${APP_PORT:-8080}:8000"
    networks:
      - appnet

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-healingtouch}
      DB_USERNAME: ${DB_USERNAME:-healingtouch}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=120"]
    depends_on:
      redis:
        condition: service_started
      app:
        condition: service_started
    networks:
      - appnet

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-healingtouch}
      MYSQL_USER: ${DB_USERNAME:-healingtouch}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root-secret}
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-root-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - appnet

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_FORWARD_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - appnet

volumes:
  mysql_data:
  redis_data:

networks:
  appnet:
    driver: bridge
